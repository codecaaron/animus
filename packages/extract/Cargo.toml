[package]
name = "animus-extract"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
oxc_parser = "0.121.0"
oxc_ast = "0.121.0"
oxc_span = "0.121.0"
oxc_allocator = "0.121.0"
oxc_syntax = "0.121.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
napi = { version = "3", features = ["serde-json", "napi9"] }
napi-derive = "3"
once_cell = "1"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
