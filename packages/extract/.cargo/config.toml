# napi-rs uses this for target-specific linker settings
# On macOS, cdylib needs this for Node.js addon loading
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# Prevent segfault when Node.js unloads worker threads while native addon
# thread-local storage is still mapped (NAPI-RS production issue on Linux).
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-Wl,-z,nodelete"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-Wl,-z,nodelete"]
