[package]
name = "animus-system-loader"
version = "0.1.0"
edition = "2021"
rust-version = "1.95.0"

[dependencies]
oxc = { version = "0.139", features = ["semantic", "transformer", "codegen"] }
rquickjs = { version = "0.12.1", features = ["bindgen"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
